<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cardapio digital personalizado com pedidos, status e painel administrativo."
    />
    <link rel="icon" href="./yg-systems-monogram.png" />
    <link rel="stylesheet" href="../shared/demo-runtime.css" />
    <link rel="stylesheet" href="./assets/index-CLEQBzRg.css" />
    <title>Restaurante | Demo personalizada</title>
    <script src="../shared/demo-runtime.js"></script>
    <script>
      (() => {
        const session = window.YG_DEMO_SESSION_ID || "preview";
        const originalKey = "aconchego-pizzaria-v2";
        const scopedKey = `${window.YG_DEMO_STORAGE_PREFIX}:restaurante`;
        const getItem = Storage.prototype.getItem;
        const setItem = Storage.prototype.setItem;
        const removeItem = Storage.prototype.removeItem;

        Storage.prototype.getItem = function (key) {
          return getItem.call(this, key === originalKey ? scopedKey : key);
        };
        Storage.prototype.setItem = function (key, value) {
          return setItem.call(this, key === originalKey ? scopedKey : key, value);
        };
        Storage.prototype.removeItem = function (key) {
          return removeItem.call(this, key === originalKey ? scopedKey : key);
        };

        document.documentElement.dataset.demoSession = session;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script defer src="./assets/index-DB8J-CyQ.js"></script>
    <script defer src="./demo-adapter.js"></script>
  </body>
</html>
