<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YG Restaurante</title>
    <link rel="stylesheet" href="../shared/demo-runtime.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="restaurant-app">
      <section class="hero-card">
        <p class="eyebrow">Cardapio digital</p>
        <h1 data-business-name>Restaurante Demonstracao</h1>
        <p>Monte um pedido, escolha entrega ou retirada e acompanhe o status sem abrir WhatsApp real.</p>
      </section>
      <section class="menu-grid">
        <article><span>Pizza Grande</span><strong>R$ 49,90</strong><button>Adicionar</button></article>
        <article><span>Combo Familia</span><strong>R$ 69,90</strong><button>Adicionar</button></article>
        <article><span>Refrigerante 2L</span><strong>R$ 12,00</strong><button>Adicionar</button></article>
      </section>
      <aside class="checkout">
        <h2>Pedido simulado</h2>
        <p>2 sabores selecionados: Calabresa e Marguerita.</p>
        <div><span>Entrega</span><strong>Em preparo</strong></div>
        <button>Ver previa da mensagem</button>
      </aside>
    </main>
    <script src="../shared/demo-runtime.js"></script>
    <script src="demo-adapter.js"></script>
  </body>
</html>
