<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YG Financeiro</title>
    <link rel="stylesheet" href="../shared/demo-runtime.css" />
    <link rel="stylesheet" href="../restaurante/styles.css" />
  </head>
  <body>
    <main class="restaurant-app">
      <section class="hero-card">
        <p class="eyebrow">Financeiro</p>
        <h1 data-business-name>Empresa Demonstracao</h1>
        <p>Entradas, saidas, contas e resumo mensal em uma visao simples.</p>

      <section class="menu-grid">
        <article><span>Receitas</span><strong>R$ 8.920,00</strong><button>Lancar entrada</button></article>
        <article><span>Despesas</span><strong>R$ 4.640,00</strong><button>Lancar despesa</button></article>
        <article><span>Saldo</span><strong>R$ 4.280,00</strong><button>Ver resumo</button></article>
      </section>
    </main>
    <script src="../shared/demo-runtime.js"></script>
    <script src="demo-adapter.js"></script>
